AllCops:
  NewCops: enable
  TargetRubyVersion: 3.2
  Exclude:
    - "vendor/**/*"
    - "Gemfile"
    - "Rakefile"

Layout/LineLength:
  Max: 130

Metrics/AbcSize:
  Max: 55

Metrics/ClassLength:
  Max: 170

Metrics/CyclomaticComplexity:
  Max: 10

Metrics/MethodLength:
  Max: 55

Metrics/PerceivedComplexity:
  Max: 11

Metrics/BlockLength:
  Max: 30
  Exclude:
    - "test/**/*"

Naming/MethodParameterName:
  MinNameLength: 1

Lint/UnmodifiedReduceAccumulator:
  Enabled: false

Style/Documentation:
  Enabled: false

Style/FrozenStringLiteralComment:
  Enabled: false

Style/StringLiterals:
  Enabled: false
